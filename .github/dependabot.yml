version: 2
updates:
  # GitHub Actions versions in workflow files
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope

  # Python deps — allgaeuer_zeitung_mcp
  - package-ecosystem: pip
    directory: /tools/allgaeuer_zeitung_mcp
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    groups:
      dev:
        dependency-type: development
      prod:
        dependency-type: production

  # Python deps — pdf_ingest
  - package-ecosystem: pip
    directory: /tools/pdf_ingest
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    groups:
      dev:
        dependency-type: development
      prod:
        dependency-type: production

# NOTE: Elixir deps are managed by Renovate (see renovate.json). The `mix` manager
# bumps mix.exs constraints; workspace.lock is invisible to it and regenerated
# by `mix deps.get` in CI. Dependabot's `mix` ecosystem would require mix.lock,
# which this repo does not use (workspace tool uses workspace.lock instead).
