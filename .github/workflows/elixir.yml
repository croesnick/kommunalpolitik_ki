name: elixir

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: elixir-${{ github.ref }}
  cancel-in-progress: true

jobs:
  elixir:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang/Elixir
        id: setup-beam
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.x"
          otp-version: "27"

      - name: Restore deps & build cache
        uses: actions/cache@v6
        with:
          path: |
            artifacts/deps
            _build
          key: elixir-deps-${{ runner.os }}-${{ steps.setup-beam.outputs.otpvsn }}-${{ steps.setup-beam.outputs.elixirvsn }}-${{ hashFiles('**/workspace.lock') }}
          restore-keys: |
            elixir-deps-${{ runner.os }}-${{ steps.setup-beam.outputs.otpvsn }}-${{ steps.setup-beam.outputs.elixirvsn }}-
            elixir-deps-${{ runner.os }}-${{ steps.setup-beam.outputs.otpvsn }}-
            elixir-deps-${{ runner.os }}-

      - name: Install dependencies
        run: |
          mix deps.get
          mix workspace.run -t deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Lint (credo)
        run: mix workspace.run -t credo -p ratsinfo -p shared -- --strict

      - name: Tests
        run: mix workspace.run -t test -p ratsinfo -p shared -- --cover

      # Note: mix dialyzer intentionally omitted. Only 2 of 3 workspace apps
      # have dialyxir as a dependency — ratsprojekte does not — so a workspace-
      # wide dialyzer run would fail.
