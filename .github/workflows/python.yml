name: python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: python-${{ matrix.tool }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [allgaeuer_zeitung_mcp, pdf_ingest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: tools/${{ matrix.tool }}/uv.lock

      - name: Sync dependencies
        working-directory: tools/${{ matrix.tool }}
        run: uv sync

      - name: Ruff lint
        working-directory: tools/${{ matrix.tool }}
        run: uv run ruff check

      - name: Ruff format check
        working-directory: tools/${{ matrix.tool }}
        run: uv run ruff format --check

      - name: mypy
        working-directory: tools/${{ matrix.tool }}
        run: uv run mypy src/

      - name: pytest
        working-directory: tools/${{ matrix.tool }}
        run: uv run pytest
