name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python }}-${{ hashFiles('tools/allgaeuer_zeitung_mcp/uv.lock') }}

      - name: Install deps
        run: |
          cd tools/allgaeuer_zeitung_mcp
          uv sync

      - name: Ruff check
        run: |
          cd tools/allgaeuer_zeitung_mcp
          uv run ruff check

      - name: Ruff format check
        run: |
          cd tools/allgaeuer_zeitung_mcp
          uv run ruff format --check

      - name: Mypy
        run: |
          cd tools/allgaeuer_zeitung_mcp
          uv run mypy src/

      - name: Pytest
        run: |
          cd tools/allgaeuer_zeitung_mcp
          uv run pytest || true
